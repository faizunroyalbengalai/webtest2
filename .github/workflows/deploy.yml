name: Deploy webtest2

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision EC2
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.server_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
            -var="region=us-east-1"

      - name: Get server IP
        id: get_ip
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "server_ip=$SERVER_IP" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure EC2 with Ansible
    runs-on: ubuntu-latest
    needs: provision
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH private key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Wait for SSH to be ready
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Waiting for SSH on $SERVER_IP..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i /tmp/deploy_key ubuntu@"$SERVER_IP" "echo ready" 2>/dev/null; then
              echo "SSH is ready."
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Run Ansible Playbook
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          ansible-playbook -i "$SERVER_IP," \
            --private-key /tmp/deploy_key \
            -u ubuntu \
            ansible/playbook.yml \
            -e "app_dir=/opt/app" \
            -e "repo_url=${{ secrets.REPO_URL }}" \
            -e "branch=${{ github.ref_name }}" \
            -e "database_url='${{ secrets.DATABASE_URL }}'" \
            -e "mongo_uri='${{ secrets.MONGO_URI }}'" \
            -e "db_host='${{ secrets.DB_HOST }}'" \
            -e "db_port='${{ secrets.DB_PORT }}'" \
            -e "db_name='${{ secrets.DB_NAME }}'" \
            -e "db_user='${{ secrets.DB_USER }}'" \
            -e "db_password='${{ secrets.DB_PASSWORD }}'" \
            -e "install_db='${{ secrets.INSTALL_DB_ON_EC2 }}'" \
            -e "db_type='${{ secrets.DB_TYPE }}'" \
            -e "db_username='${{ secrets.DB_USERNAME }}'" \
            -e "db_password_plain='${{ secrets.DB_PASSWORD }}'"

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH private key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Verify application health
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          ansible -i "$SERVER_IP," all \
            --private-key /tmp/deploy_key \
            -u ubuntu \
            -m shell \
            -a "
              echo 'Waiting for app on 127.0.0.1:8000...'
              for i in \$(seq 1 12); do
                if curl -sf http://127.0.0.1:8000/health; then
                  echo 'Health check passed.'
                  echo 'server_ip=$SERVER_IP'
                  exit 0
                fi
                echo \"Attempt \$i failed, retrying in 10s...\"
                sleep 10
              done
              echo 'Health check timed out after 120s. Showing logs:'
              sudo journalctl -u webtest2 --no-pager -n 50 || true
              exit 1
            "

      - name: Print server IP on success
        run: |
          echo "Deployment verified successfully."
          echo "server_ip=${{ needs.provision.outputs.server_ip }}"

  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: [provision, verify]
    if: always()
    steps:
      - name: Deployment success notification
        if: ${{ needs.verify.result == 'success' }}
        run: |
          echo "Deployment of webtest2 succeeded!"
          echo "Server IP: ${{ needs.provision.outputs.server_ip }}"
          echo "App URL: http://${{ needs.provision.outputs.server_ip }}"
          echo "Health URL: http://${{ needs.provision.outputs.server_ip }}/health"

      - name: Deployment failure notification
        if: ${{ needs.verify.result != 'success' }}
        run: |
          echo "Deployment of webtest2 FAILED."
          echo "Server IP: ${{ needs.provision.outputs.server_ip }}"
          echo "Check logs above for details."
          exit 1