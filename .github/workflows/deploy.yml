name: Deploy webtest2

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision EC2
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.server_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
            -var="region=us-east-1"

      - name: Get Server IP
        id: get_ip
        working-directory: terraform
        run: |
          echo "server_ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure EC2 with Ansible
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Wait for SSH to be ready
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Waiting for SSH on $SERVER_IP..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/deploy_key ubuntu@$SERVER_IP "echo ready" 2>/dev/null; then
              echo "SSH is ready"
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          ansible-playbook ansible/playbook.yml \
            -i "$SERVER_IP," \
            -u ubuntu \
            --private-key ~/.ssh/deploy_key \
            -e "app_repo=${{ secrets.APP_REPO }}" \
            -e "app_dir=/opt/app" \
            -e "app_port=8000" \
            -e "python_version=3.11" \
            -e "database_url='${{ secrets.DATABASE_URL }}'" \
            -e "mongo_uri='${{ secrets.MONGO_URI }}'" \
            -e "db_host='${{ secrets.DB_HOST }}'" \
            -e "db_port='${{ secrets.DB_PORT }}'" \
            -e "db_name='${{ secrets.DB_NAME }}'" \
            -e "db_user='${{ secrets.DB_USER }}'" \
            -e "db_user='${{ secrets.DB_USER }}'" \
            -e "db_username='${{ secrets.DB_USERNAME }}'" \
            -e "db_password='${{ secrets.DB_PASSWORD }}'" \
            -e "db_password_plain='${{ secrets.DB_PASSWORD }}'" \
            -e "install_db='${{ secrets.INSTALL_DB_ON_EC2 }}'" \
            -e "db_type='${{ secrets.DB_TYPE }}'"

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Verify application health via Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          ansible-playbook ansible/verify.yml \
            -i "$SERVER_IP," \
            -u ubuntu \
            --private-key ~/.ssh/deploy_key \
            -e "app_port=8000" \
            -e "server_ip=$SERVER_IP"

  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: [provision, verify]
    if: always()
    steps:
      - name: Deployment success
        if: ${{ needs.verify.result == 'success' }}
        run: |
          echo "Deployment of webtest2 succeeded!"
          echo "Application is available at: http://${{ needs.provision.outputs.server_ip }}"

      - name: Deployment failed
        if: ${{ needs.verify.result != 'success' }}
        run: |
          echo "Deployment of webtest2 failed!"
          echo "Please check the logs above for details."
          exit 1